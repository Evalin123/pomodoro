<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pomodoro Timer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header>
      <h1>🍅 Pomodoro Timer</h1>
    </header>

    <div class="modes">
      <button class="mode-btn active" data-mode="pomodoro">Pomodoro</button>
      <button class="mode-btn" data-mode="short-break">Short Break</button>
      <button class="mode-btn" data-mode="long-break">Long Break</button>
    </div>

    <div class="timer-container">
      <svg class="progress-ring" viewBox="0 0 220 220" aria-hidden="true">
        <circle class="progress-ring__track" cx="110" cy="110" r="100" />
        <circle class="progress-ring__fill" id="progressCircle" cx="110" cy="110" r="100" />
      </svg>
      <div class="timer-display">
        <span id="timerDisplay">25:00</span>
      </div>
    </div>

    <div class="controls">
      <button class="ctrl-btn" id="resetBtn" title="Reset" aria-label="Reset timer">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3"/>
        </svg>
      </button>
      <button class="ctrl-btn start-btn" id="startBtn" aria-label="Start timer">
        <svg id="startIcon" viewBox="0 0 24 24" fill="currentColor">
          <polygon points="5,3 19,12 5,21"/>
        </svg>
        <svg id="pauseIcon" viewBox="0 0 24 24" fill="currentColor" style="display:none;">
          <rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>
        </svg>
      </button>
      <button class="ctrl-btn" id="skipBtn" title="Skip" aria-label="Skip to next session">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="5 12 19 12"/><polyline points="13 6 19 12 13 18"/>
        </svg>
      </button>
    </div>

    <div class="session-info">
      <span id="sessionLabel">Session <span id="sessionCount">1</span></span>
      <span class="separator">·</span>
      <span id="modeLabel">Focus Time</span>
    </div>

    <div class="pomodoro-dots" id="pomodoroDots" aria-label="Completed sessions">
      <span class="dot" data-session="1"></span>
      <span class="dot" data-session="2"></span>
      <span class="dot" data-session="3"></span>
      <span class="dot" data-session="4"></span>
    </div>

    <div class="notification" id="notification" role="status" aria-live="polite"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
