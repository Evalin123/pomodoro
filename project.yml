name: Pomodoro
options:
    bundleIdPrefix: com.yourname
    deploymentTarget:
        iOS: "17.0"
        macOS: "15.0"
        watchOS: "10.0"

fileGroups:
    - Shared
    - iOS
    - macOS
    - watchOS

settings:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: "" # 留空讓 Xcode 自動選擇，或填入你的 Team ID

targets:
    Pomodoro-iOS:
        type: application
        platform: iOS
        deploymentTarget: "17.0"
        sources:
            - path: Shared
            - path: iOS
        settings:
            PRODUCT_BUNDLE_IDENTIFIER: com.yourname.Pomodoro
            INFOPLIST_FILE: iOS/Info.plist
            ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
            CODE_SIGN_STYLE: Automatic
            DEVELOPMENT_TEAM: ""
        scheme:
            testTargets: []
            gatherCoverageData: false
        entitlements:
            path: iOS/Pomodoro.entitlements
            properties:
                com.apple.security.application-groups:
                    - group.com.yourname.Pomodoro
                aps-environment: development

    Pomodoro-macOS:
        type: application
        platform: macOS
        deploymentTarget: "15.0"
        sources:
            - path: Shared
            - path: macOS
            - path: iOS/NotificationManager.swift
        settings:
            PRODUCT_BUNDLE_IDENTIFIER: com.yourname.Pomodoro
            INFOPLIST_FILE: macOS/Info.plist
            ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
            CODE_SIGN_ALLOW_ENTITLEMENTS_MODIFICATION: YES
        scheme:
            testTargets: []
            gatherCoverageData: false
        entitlements:
            path: macOS/Pomodoro.entitlements

    Pomodoro-watchOS:
        type: application
        platform: watchOS
        deploymentTarget: "10.0"
        sources:
            - path: Shared
            - path: watchOS
        settings:
            PRODUCT_BUNDLE_IDENTIFIER: com.yourname.Pomodoro.watchkitapp
            INFOPLIST_FILE: watchOS/Info.plist
            ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
            CODE_SIGN_STYLE: Automatic
            DEVELOPMENT_TEAM: ""
        scheme:
            testTargets: []
            gatherCoverageData: false
